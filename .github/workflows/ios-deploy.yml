name: iOS Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate app icon asset catalog
        run: |
          ICON_DIR="PersonalAiAssistant/Resources/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"

          cat > PersonalAiAssistant/Resources/Assets.xcassets/Contents.json << 'EOF'
          {
            "info" : { "author" : "xcode", "version" : 1 }
          }
          EOF

          cat > "$ICON_DIR/Contents.json" << 'EOF'
          {
            "images" : [
              {
                "filename" : "AppIcon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : { "author" : "xcode", "version" : 1 }
          }
          EOF

          # Generate a placeholder 1024x1024 PNG if no real icon exists
          if [ ! -f "$ICON_DIR/AppIcon.png" ]; then
            python3 -c "
          import struct, zlib
          w, h = 1024, 1024
          row = b'\x00' + b'\x3b\x82\xf6' * w  # Blue (#3B82F6)
          raw = row * h
          def chunk(t, d):
              c = t + d
              return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          png = b'\x89PNG\r\n\x1a\n'
          png += chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
          png += chunk(b'IDAT', zlib.compress(raw, 9))
          png += chunk(b'IEND', b'')
          with open('$ICON_DIR/AppIcon.png', 'wb') as f:
              f.write(png)
          print('Generated placeholder 1024x1024 app icon')
          "
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PersonalAiAssistant.xcodeproj \
            -scheme PersonalAiAssistant

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project PersonalAiAssistant.xcodeproj \
            -scheme PersonalAiAssistant \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Boot simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes iOS -j | python3 -c "import sys,json; rts=json.load(sys.stdin)['runtimes']; print(rts[-1]['identifier'])")
          UDID=$(xcrun simctl create 'CI iPhone' "com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro" "$RUNTIME")
          xcrun simctl boot "$UDID"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -project PersonalAiAssistant.xcodeproj \
            -scheme PersonalAiAssistantTests \
            -destination "platform=iOS Simulator,id=$SIM_UDID"

      - name: Deploy to TestFlight
        if: github.ref == 'refs/heads/main'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ vars.MATCH_REPO_URL }}
          MATCH_PASSWORD: ${{ vars.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
        run: bundle exec fastlane ios beta
