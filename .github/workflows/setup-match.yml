name: Initialize Fastlane Match

on:
  workflow_dispatch:
    inputs:
      match_type:
        description: "development, appstore, or adhoc"
        required: true
        default: "development"

jobs:
  setup-match:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - run: bundle exec fastlane match ${{ github.event.inputs.match_type }} --generate_apple_certs true --readonly false
        env:
          MATCH_GIT_URL: ${{ vars.MATCH_REPO_URL }}
          MATCH_PASSWORD: ${{ vars.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}