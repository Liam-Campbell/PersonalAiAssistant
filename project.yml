name: PersonalAiAssistant

options:
  bundleIdPrefix: com.personalai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "2.30.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  PersonalAiAssistant:
    type: application
    platform: iOS
    sources:
      - path: PersonalAiAssistant
        excludes:
          - "**/*.plist"
    settings:
      base:
        INFOPLIST_FILE: PersonalAiAssistant/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.personalai.assistant
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        CODE_SIGN_IDENTITY: "$(CODE_SIGN_IDENTITY)"
        PROVISIONING_PROFILE_SPECIFIER: "$(PROVISIONING_PROFILE_SPECIFIER)"
    entitlements:
      path: PersonalAiAssistant/Resources/PersonalAiAssistant.entitlements
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
